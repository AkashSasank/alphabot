[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "algotrade"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "gradio>=5.29.0",
    "kiteconnect>=5.1.0",
    "matplotlib>=3.8.0",
    "plotly>=5.24.0",
    "playwright>=1.53.0",
    "pydantic>=2.12.5",
    "python-dotenv>=1.0.0",
    "langgraph>=1.1.9",
    "langchain>=1.2.15",
    "dask[dataframe]>=2026.3.0",
]

[project.scripts]
tradingbot-init = "tradingbot.cli:init_command"

[tool.hatch.build.targets.wheel]
packages = ["src/tradingbot", "src/market_agent"]

[tool.hatch.build.targets.sdist]
include = [
    "src/tradingbot",
    "src/market_agent",
    "README.md",
    "pyproject.toml",
]
