[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tradingbot"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "gradio>=5.29.0",
    "kiteconnect>=5.1.0",
    "matplotlib>=3.8.0",
    "plotly>=5.24.0",
    "playwright>=1.53.0",
    "pydantic>=2.12.5",
    "python-dotenv>=1.0.0",
]

[project.scripts]
tradingbot-init = "tradingbot.cli:init_command"
tradingbot-extract-features = "tradingbot.feature_extractor:extract_features_command"

